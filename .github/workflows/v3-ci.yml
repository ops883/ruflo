name: V3 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'v3/**'
      - '.github/workflows/v3-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'v3/**'
      - '.github/workflows/v3-ci.yml'

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Test V3 Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CLI dependencies
        working-directory: v3/@claude-flow/cli
        run: npm ci --legacy-peer-deps

      - name: Install memory dependencies
        working-directory: v3/@claude-flow/memory
        run: npm ci --legacy-peer-deps

      - name: Install swarm dependencies
        working-directory: v3/@claude-flow/swarm
        run: npm ci --legacy-peer-deps

      - name: Test CLI
        working-directory: v3/@claude-flow/cli
        run: npx vitest run --reporter=verbose
        continue-on-error: true

      - name: Test memory
        working-directory: v3/@claude-flow/memory
        run: npx vitest run --reporter=verbose
        continue-on-error: true

      - name: Test swarm
        working-directory: v3/@claude-flow/swarm
        run: npx vitest run --reporter=verbose
        continue-on-error: true

  typecheck:
    name: Type Check V3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CLI dependencies
        working-directory: v3/@claude-flow/cli
        run: npm ci --legacy-peer-deps

      - name: Install memory dependencies
        working-directory: v3/@claude-flow/memory
        run: npm ci --legacy-peer-deps

      - name: Install swarm dependencies
        working-directory: v3/@claude-flow/swarm
        run: npm ci --legacy-peer-deps

      - name: Type check CLI
        working-directory: v3/@claude-flow/cli
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Type check memory
        working-directory: v3/@claude-flow/memory
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Type check swarm
        working-directory: v3/@claude-flow/swarm
        run: npx tsc --noEmit
        continue-on-error: true

  build:
    name: Build V3 (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CLI dependencies
        working-directory: v3/@claude-flow/cli
        run: npm ci --legacy-peer-deps

      - name: Build CLI
        working-directory: v3/@claude-flow/cli
        run: npx tsc

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: v3-build-${{ matrix.os }}
          path: v3/@claude-flow/*/dist/

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CLI dependencies
        working-directory: v3/@claude-flow/cli
        run: npm ci --legacy-peer-deps

      - name: Build CLI
        working-directory: v3/@claude-flow/cli
        run: npx tsc

      - name: Publish CLI
        working-directory: v3/@claude-flow/cli
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
