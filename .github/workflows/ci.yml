name: CI

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build CLI
        run: npm run build:ts

      - name: Type check
        run: npx tsc --noEmit --project src/@claude-flow/cli/tsconfig.json

      - name: Verify CLI loads
        run: node bin/cli.js --version

      - name: Package (smoke test)
        run: npm pack --dry-run

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build CLI (tests import compiled output)
        run: npm run build:ts

      - name: Run tests
        run: npx vitest run --reporter=verbose

  lint:
    name: Lint & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high || true
        continue-on-error: true
